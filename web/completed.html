<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="已制作图书视频内容看板">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>已制作内容看板</title>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      if (!params.has("fresh")) {
        params.set("fresh", String(Date.now()));
        location.replace(`${location.pathname}?${params.toString()}`);
      }
    })();
  </script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="completed">
  <header class="page-header">
    <div>
      <p class="eyebrow">SPH CONTENT</p>
      <h1>已制作内容看板</h1>
      <p class="subtitle">集中归档已经制作完成的视频素材，仍可复制、查看和改回制作状态。</p>
      <p class="skill-badge">
        <span>调用 Skill</span>
        <code>$run-book-video-workflow</code>
      </p>
      <nav class="page-nav" aria-label="看板页面">
        <a href="./index.html">进行中</a>
        <a class="active" href="./completed.html">已制作</a>
      </nav>
    </div>
    <div class="summary" aria-label="稿件统计">
      <div><strong id="totalCount">0</strong><span>全部稿件</span></div>
      <div><strong id="reviewCount">0</strong><span>待审核</span></div>
      <div><strong id="makingCount">0</strong><span>待制作</span></div>
      <div><strong id="doneCount">0</strong><span>已制作</span></div>
    </div>
  </header>

  <main>
    <section class="toolbar" aria-label="筛选工具">
      <label class="search-box">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="搜索书名、作者、视频简介、一句话介绍或视频链接">
      </label>
      <label class="filter-box">
        <span>制作状态</span>
        <select id="statusFilter">
          <option value="all">全部已制作</option>
          <option value="已制作">已制作</option>
        </select>
      </label>
      <p id="visibleCount" class="visible-count">当前显示 0 条</p>
    </section>

    <section class="board-section completed-section" aria-labelledby="activeTableTitle">
      <div class="section-heading">
        <div>
          <p class="section-kicker">COMPLETED</p>
          <h2 id="activeTableTitle">已制作</h2>
        </div>
        <span id="activeVisibleCount">0 条</span>
      </div>
      <div class="table-shell completed-table-shell" aria-label="已制作稿件内容表">
        <div id="activeTableScroll" class="table-scroll">
          <table>
            <thead>
              <tr>
                <th class="col-index">序号</th>
                <th class="col-book">书名</th>
                <th class="col-author">作者</th>
                <th class="col-intro">视频简介</th>
                <th class="col-link">视频链接</th>
                <th class="col-long">原文</th>
                <th class="col-long">二创</th>
                <th class="col-long">分段文案</th>
                <th class="col-long">生图提示词</th>
                <th class="col-one-line">一句话介绍</th>
                <th class="col-long">字幕</th>
                <th class="col-note">备注</th>
                <th class="col-status">制作状态</th>
              </tr>
            </thead>
            <tbody id="contentRows"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state" hidden>
          <strong>还没有已制作稿件</strong>
          <span>在进行中页面把状态切换为“已制作”后，内容会出现在这里。</span>
        </div>
      </div>
    </section>
  </main>

  <dialog id="contentDialog">
    <div class="dialog-header">
      <div>
        <p id="dialogBook" class="dialog-book"></p>
        <h2 id="dialogTitle">查看内容</h2>
      </div>
      <button id="closeDialog" class="icon-button" type="button" aria-label="关闭">×</button>
    </div>
    <pre id="dialogContent"></pre>
    <div class="dialog-actions">
      <button id="dialogCopy" class="primary-button" type="button">复制全部</button>
      <button id="dialogCloseButton" class="secondary-button" type="button">关闭</button>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      const version = `latest-${Date.now()}`;
      const stylesheet = document.querySelector('link[rel="stylesheet"]');
      if (stylesheet) stylesheet.href = `./styles.css?v=${version}`;
      const scripts = [
        "./data.js",
        "./data-naval-wealth.js",
        "./data-late-health.js",
        "./data-late-health-active-aging.js",
        "./data-aging-from-50.js",
        "./app.js"
      ];
      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = `${src}?v=${version}`;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`加载失败：${src}`));
          document.body.append(script);
        });

      scripts
        .reduce((chain, src) => chain.then(() => loadScript(src)), Promise.resolve())
        .catch((error) => {
          document.body.insertAdjacentHTML(
            "beforeend",
            `<div class="empty-state"><strong>脚本加载失败</strong><span>${error.message}</span></div>`
          );
        });
    })();
  </script>
</body>
</html>
